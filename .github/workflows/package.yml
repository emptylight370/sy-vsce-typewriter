name: package

on:
  push:
    branches:
      - main
    paths:
      - plugin.json
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 50
          fetch-tags: true

      - uses: jdx/mise-action@v4

      - name: Install deps
        run: pnpm install

      - name: Build scss
        run: pnpm run build

      - name: Get current version
        uses: emptylight370/jq-action@v1
        id: version
        with:
          data: plugin.json
          filter: .version

      - name: Generate release log
        run: |
          conventional-changelog -i release.md -n changelog.json -c plugin.json
          prettier -w release.md

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: package.zip
          name: Release ${{ steps.version.outputs.result }}
          tag_name: ${{ steps.version.outputs.result }}
          make_latest: true
          body_path: release.md
